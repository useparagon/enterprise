{{/*
Standard PodDisruptionBudget for microservices.
Call with: include "pdb.standard" .
Enabled by default. Set pdb.enabled=false to opt out.
*/}}
{{- define "pdb.standard" -}}
{{- $enabled := true -}}
{{- if .Values.pdb -}}
{{- if hasKey .Values.pdb "enabled" -}}
{{- $enabled = .Values.pdb.enabled -}}
{{- end -}}
{{- end -}}
{{- if $enabled }}
{{- $name := .Chart.Name -}}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include (printf "%s.fullname" $name) . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include (printf "%s.labels" $name) . | nindent 4 }}
spec:
  {{- if and .Values.pdb (hasKey .Values.pdb "maxUnavailable") }}
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  {{- else }}
  maxUnavailable: 1
  {{- end }}
  selector:
    matchLabels:
      {{- include (printf "%s.selectorLabels" $name) . | nindent 6 }}
{{- end }}
{{- end -}}
